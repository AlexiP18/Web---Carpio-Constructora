# Configuración de Netlify para Constructora Carpio

[build]
  command = "npm run build:cloud"
  publish = "dist"
  functions = "netlify/functions"

# Configuración de Netlify Functions (para TinaCMS + Cloudinary)
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express"]

# Configuración de Netlify Identity para Decap CMS
[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Excepciones para archivos estáticos de TinaCMS (bridge.js y assets)
[[redirects]]
  from = "/admin/bridge.js"
  to = "/admin/bridge.js"
  status = 200

[[redirects]]
  from = "/admin/assets/*"
  to = "/admin/assets/:splat"
  status = 200

# Redirecciones para el admin de Decap CMS
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Redirección para API de Cloudinary Media (TinaCMS)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Habilitar Git Gateway para Decap CMS
[context.production]
  command = "npm run build:cloud"

[context.deploy-preview]
  command = "npm run build:cloud"

[context.branch-deploy]
  command = "npm run build:cloud"
